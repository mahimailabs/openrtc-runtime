# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# Code reviews: off by default (use @coderabbitai review / full review on demand).
# PR description: high_level_summary keeps the generated summary in the PR body.
language: "en-US"
early_access: false
reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: true
  review_status: true
  review_details: false
  auto_review:
    enabled: false
    drafts: false
chat:
  auto_reply: true
