name: Docs

on:
  pull_request:
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'

jobs:
  validate-mint-json:
    name: Validate mint.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate mint.json is valid JSON
        run: python3 -c "import json, sys; json.load(open('docs/mint.json')); print('mint.json is valid')"
