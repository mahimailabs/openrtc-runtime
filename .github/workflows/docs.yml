name: Docs

on:
  pull_request:
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'

jobs:
  validate-docs:
    name: Validate docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docs structure and house style
        # Stdlib-only validator: docs.json shape, page/link resolution, no orphans,
        # required frontmatter, and the no-em-dash house-style rule. No deps to install.
        run: python3 docs/_check_docs.py
